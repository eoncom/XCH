version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: xch-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xch_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-XchSecure2024!}
      POSTGRES_DB: ${POSTGRES_DB:-xch_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xch_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xch-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: xch-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xch-network
    restart: unless-stopped

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: xch-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-xch_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-XchMinIO2024SecureKey!}
      MINIO_SERVER_URL: https://xchstr.eoncom.io
      MINIO_BROWSER_REDIRECT_URL: https://xchstr.eoncom.io
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - xch-network
    restart: unless-stopped

  # MinIO Client (mc) - Create buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: xch-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set xch http://minio:9000 ${MINIO_ACCESS_KEY:-xch_minio_admin} ${MINIO_SECRET_KEY:-XchMinIO2024SecureKey!};
      mc mb xch/xch-storage --ignore-existing;
      mc mb xch/plans --ignore-existing;
      mc mb xch/photos --ignore-existing;
      mc mb xch/exports --ignore-existing;
      mc mb xch/qrcodes --ignore-existing;
      mc anonymous set download xch/xch-storage;
      mc anonymous set download xch/qrcodes;
      exit 0;
      "
    networks:
      - xch-network

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xch-backend
    env_file:
      - ./backend/.env
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - xch-network
    restart: unless-stopped
    command: >
      sh -c "
      echo 'Generating Prisma client...' &&
      npx prisma generate &&
      echo 'Running database migrations...' &&
      npx prisma migrate deploy &&
      echo 'Seeding database (if empty)...' &&
      npm run prisma:seed || echo 'Seed failed or already populated' &&
      echo 'Starting backend server...' &&
      npm run start:prod
      "

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xch-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost:3002}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_APP_URL:-http://localhost:3001}
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - xch-network
    restart: unless-stopped

  # Nginx Reverse Proxy (disabled - using nginx-proxy-manager instead)
  # nginx:
  #   image: nginx:alpine
  #   container_name: xch-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - xch-network
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  xch-network:
    driver: bridge
