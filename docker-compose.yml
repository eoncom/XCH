version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: xch-postgres
    environment:
      # S1-closing 2026-04-26 — secrets strict :?... pour bloquer le démarrage
      # si .env est absent. Plus de fallback en clair commitable. POSTGRES_USER
      # garde un défaut lisible (username, pas un secret), POSTGRES_DB pareil.
      POSTGRES_USER: ${POSTGRES_USER:-xch_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD est requis dans .env}
      POSTGRES_DB: ${POSTGRES_DB:-xch_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xch_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xch-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: xch-redis
    # S1 hardening 2026-04-26 — auth conditionnelle :
    #   - Si REDIS_PASSWORD est défini (.env), démarre avec --requirepass
    #   - Sinon (dev rapide sans .env), démarre sans auth (compat ascendante)
    # Pour la prod, REDIS_PASSWORD doit ÊTRE défini (généré par
    # scripts/rotate-secrets.sh --phase b). Le dev recommandé : pose aussi
    # un REDIS_PASSWORD pour matcher la prod.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes; else exec redis-server --appendonly yes; fi"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xch-network
    restart: unless-stopped

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: xch-minio
    command: server /data --console-address ":9001"
    environment:
      # S1-closing 2026-04-26 — secrets strict :?... (cf. postgres ci-dessus).
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY est requis dans .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY est requis dans .env}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - xch-network
    restart: unless-stopped

  # MinIO Client (mc) - Create buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: xch-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set xch http://minio:9000 ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY est requis dans .env} ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY est requis dans .env};
      mc mb xch/xch-storage --ignore-existing;
      mc mb xch/plans --ignore-existing;
      mc mb xch/photos --ignore-existing;
      mc mb xch/exports --ignore-existing;
      mc mb xch/qrcodes --ignore-existing;
      mc mb xch/xch-backups --ignore-existing;
      mc anonymous set download xch/xch-storage;
      mc anonymous set download xch/qrcodes;
      exit 0;
      "
    networks:
      - xch-network

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xch-backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - xch-network
    restart: unless-stopped
    # Startup handled by docker-entrypoint.sh:
    #   1. prisma generate
    #   2. prisma migrate deploy
    #   3. node dist/main
    # Demo data is loaded via Setup Wizard (POST /api/setup/initialize)

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xch-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_APP_URL:-}
    depends_on:
      - backend
    networks:
      - xch-network
    restart: unless-stopped

  # Gatus (Monitoring / Health Dashboard)
  gatus:
    image: twinproduction/gatus:latest
    container_name: xch-gatus
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
      - gatus_data:/data
    ports:
      - "${GATUS_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - xch-network
    restart: unless-stopped

  # Nginx Reverse Proxy (single entry point)
  # Uses Docker profile: only starts with --profile proxy or COMPOSE_PROFILES=proxy
  # Skip this when using an external nginx (e.g. Nginx Proxy Manager)
  nginx:
    image: nginx:alpine
    container_name: xch-nginx
    profiles:
      - proxy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - xch-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  gatus_data:
    driver: local

networks:
  xch-network:
    driver: bridge
