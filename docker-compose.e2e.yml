# Docker Compose pour tests E2E
# Lance les tests Playwright dans un container Docker

version: '3.8'

services:
  # Service de tests E2E
  playwright-tests:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    container_name: xch-e2e-tests
    # Utiliser le réseau xch-network pour accéder aux services via DNS
    networks:
      - xch-network
    environment:
      # URLs vers services XCH via DNS Docker
      - PLAYWRIGHT_BASE_URL=http://frontend:3001
      - PLAYWRIGHT_API_URL=http://backend:3002
      # Configuration CI
      - CI=true
    volumes:
      # Monter rapports pour accès depuis host
      - ./frontend/playwright-report-host:/app/playwright-report
      - ./frontend/test-results-host:/app/test-results
    # Ne pas redémarrer automatiquement (run once)
    restart: "no"
    # Options Playwright
    command: >
      npx playwright test
      --reporter=html,junit
      --output=test-results
      --retries=2
      --workers=2

# Utiliser le réseau existant créé par docker-compose.yml principal
networks:
  xch-network:
    external: true
    name: xch_xch-network
