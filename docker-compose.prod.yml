# =============================================================================
# XCH — Production Docker Compose
# Version: 1.1.1
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   - Copy .env.production.example → .env.production and edit secrets
#   - Docker 24+ and Compose v2
# =============================================================================

services:
  # ── PostgreSQL with PostGIS ────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: xch-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-xch_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xch_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xch-redis
    # S1 hardening 2026-04-26 — auth obligatoire en prod. REDIS_PASSWORD doit
    # être défini dans .env (généré par scripts/rotate-secrets.sh --phase b).
    # `${REDIS_PASSWORD:?...}` fait échouer compose au démarrage si la variable
    # est absente — meilleur que silently tourner sans password.
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required (run scripts/rotate-secrets.sh --phase b)}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      # Healthcheck doit aussi s'authentifier. Redis-cli lit -a depuis env si présent.
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO (S3-compatible storage) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: xch-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO Init (one-shot bucket creation) ──────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: xch-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set xch http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb xch/xch-storage --ignore-existing;
      mc mb xch/plans --ignore-existing;
      mc mb xch/photos --ignore-existing;
      mc mb xch/exports --ignore-existing;
      mc mb xch/qrcodes --ignore-existing;
      mc mb xch/xch-backups --ignore-existing;
      mc anonymous set download xch/xch-storage;
      mc anonymous set download xch/qrcodes;
      exit 0;
      "
    networks:
      - xch-network

  # ── Backend (NestJS API) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: xch-backend:v1.1.1
    container_name: xch-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend Worker (NestJS — ADR-014 native monitoring probes) ────────────
  # Reuses the same image as `backend` (already built above).  Consumes the
  # BullMQ `monitor-check` queue and runs ICMP/HTTP/TCP probes.  No HTTP,
  # no port exposed.  Scale horizontally with `--scale backend-worker=N`
  # if check volume grows past ~10k.
  backend-worker:
    image: xch-backend:v1.1.1
    container_name: xch-backend-worker
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      XCH_MODE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    cap_add:
      # Required for raw ICMP sockets. Falls back to TCP:80 if absent — see
      # IcmpProbe self-test at boot.
      - NET_RAW
    healthcheck:
      # File-touch (ADR-014 §6) — checks scheduler AND BullMQ consumer.
      test:
        - "CMD-SHELL"
        - "[ $$(($$(date +%s) - $$(stat -c %Y /tmp/xch-worker-alive))) -lt 60 ] && [ $$(($$(date +%s) - $$(stat -c %Y /tmp/xch-worker-consumer-alive))) -lt 120 ]"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: xch-frontend:v1.1.1
    container_name: xch-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_APP_URL:-}
    depends_on:
      - backend
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Gatus (Health Monitoring) ──────────────────────────────────────────────
  gatus:
    image: twinproduction/gatus:latest
    container_name: xch-gatus
    environment:
      GATUS_WEBHOOK_SECRET: ${GATUS_WEBHOOK_SECRET:-changeme}
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
      - gatus_data:/data
    ports:
      - "${GATUS_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: xch-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  gatus_data:
    driver: local

networks:
  xch-network:
    driver: bridge
