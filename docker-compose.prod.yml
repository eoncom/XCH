# =============================================================================
# XCH — Production Docker Compose
# Version: 1.1.1
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   - Copy .env.production.example → .env.production and edit secrets
#   - Docker 24+ and Compose v2
# =============================================================================

services:
  # ── PostgreSQL with PostGIS ────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: xch-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-xch_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xch_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xch-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO (S3-compatible storage) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: xch-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO Init (one-shot bucket creation) ──────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: xch-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set xch http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb xch/xch-storage --ignore-existing;
      mc mb xch/plans --ignore-existing;
      mc mb xch/photos --ignore-existing;
      mc mb xch/exports --ignore-existing;
      mc mb xch/qrcodes --ignore-existing;
      mc mb xch/xch-backups --ignore-existing;
      mc anonymous set download xch/xch-storage;
      mc anonymous set download xch/qrcodes;
      exit 0;
      "
    networks:
      - xch-network

  # ── Backend (NestJS API) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: xch-backend:v1.1.1
    container_name: xch-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: xch-frontend:v1.1.1
    container_name: xch-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_APP_URL:-}
    depends_on:
      - backend
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Gatus (Health Monitoring) ──────────────────────────────────────────────
  gatus:
    image: twinproduction/gatus:latest
    container_name: xch-gatus
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
      - gatus_data:/data
    ports:
      - "${GATUS_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: xch-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - xch-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  gatus_data:
    driver: local

networks:
  xch-network:
    driver: bridge
