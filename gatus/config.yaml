###############################################################################
# Gatus Configuration for XCH Testing
# Monitors follow the naming convention: [SITE_CODE] TYPE LABEL
# Types: LINK (internet), SDWAN (firewall/overlay), ASSET (network equipment)
###############################################################################

storage:
  type: sqlite
  path: /data/gatus.db

web:
  port: 8080

# Alerting: webhook back to XCH backend
alerting:
  custom:
    url: "http://xch-backend:3000/api/integrations/monitoring/webhook?provider=gatus"
    method: "POST"
    headers:
      Content-Type: "application/json"
      x-webhook-secret: "${GATUS_WEBHOOK_SECRET}"
    body: |
      {
        "endpoint_name": "[ENDPOINT_NAME]",
        "resolved": "[RESOLVED]",
        "triggered": "[TRIGGERED]",
        "description": "[ALERT_DESCRIPTION]"
      }

# ─── Endpoints ────────────────────────────────────────────────────────────────
# Site DEF-01 (La Défense - Tour Alto)
# Site SAC-01 (Saclay - Campus Sciences)
# Site VEL-01 (Vélizy - Immeuble Omega)
# ─────────────────────────────────────────────────────────────────────────────

endpoints:
  # ── DEF-01 : La Défense ──────────────────────────────────────────────────
  - name: "[DEF-01] LINK Fibre Orange"
    group: DEF-01
    url: "https://www.google.com"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 2000"
    alerts:
      - type: custom
        enabled: true
        send-on-resolved: true
        failure-threshold: 2
        success-threshold: 2

  - name: "[DEF-01] LINK 4G Backup SFR"
    group: DEF-01
    url: "https://www.cloudflare.com"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 3000"
    alerts:
      - type: custom
        enabled: true
        send-on-resolved: true
        failure-threshold: 2
        success-threshold: 2

  - name: "[DEF-01] SDWAN Firewall-1"
    group: DEF-01
    url: "https://1.1.1.1"
    interval: 60s
    conditions:
      - "[STATUS] < 500"
    alerts:
      - type: custom
        enabled: true
        send-on-resolved: true
        failure-threshold: 2
        success-threshold: 2

  - name: "[DEF-01] ASSET Switch-Core"
    group: DEF-01
    url: "https://httpbin.org/status/200"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
    alerts:
