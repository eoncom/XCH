    alerts:
      - type: custom
        enabled: true
        send-on-resolved: true
        failure-threshold: 2
        success-threshold: 2

  - name: "[VEL-01] ASSET AP-Wifi-01"
    group: VEL-01
    url: "https://httpbin.org/status/200"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: custom
        enabled: true
        send-on-resolved: true
        failure-threshold: 2
        success-threshold: 2

  # ── STC-01 : Saint-Cloud ─────────────────────────────────────────────────
  - name: "[STC-01] LINK Fibre SFR"
    group: STC-01
    url: "https://www.sfr.fr"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 3000"
    alerts:
      - type: custom
        enabled: true
