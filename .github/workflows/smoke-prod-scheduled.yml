name: Smoke prod scheduled (Track E.4 Pass 2)

# Track E.4 PR1 Pass 2 — smoke prod automatisé 4×/jour (D4.4 figé RSI).
#
# Exécute `scripts/smoke-prod.sh` contre https://xch.eoncom.io toutes les 6h
# (00h/06h/12h/18h UTC) pour détecter régression silencieuse non-déclenchée
# par PR (panne infra, expiry cert, NPM proxy DNS cache, etc.).
#
# Échec → issue GitHub auto-créée ou notif GlitchTip (à câbler Pass 9 wiring
# si BACKUP_COMPLETED pattern réutilisé). Pour MVP : sortie logs visible
# dans Actions tab + Slack/Discord webhook optionnel (gated par secret).

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC (4×/jour, espacés ~6h)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke prod https://xch.eoncom.io
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke-prod.sh
        id: smoke
        run: |
          set +e
          bash scripts/smoke-prod.sh 2>&1 | tee /tmp/smoke.log
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          if [[ "$EXIT" -ne 0 ]]; then
            echo "::error::Smoke prod 6/6 FAIL — see logs above"
          else
            echo "✓ Smoke prod 6/6 PASS"
          fi
          exit $EXIT

      - name: Notify GlitchTip on failure (optional)
        if: failure() && env.GLITCHTIP_WEBHOOK_URL != ''
        env:
          GLITCHTIP_WEBHOOK_URL: ${{ secrets.GLITCHTIP_WEBHOOK_URL }}
        run: |
          # Pattern figé pour future Pass 9 wiring BACKUP_COMPLETED
          # NotificationEmitter. Pour MVP smoke prod scheduled : webhook
          # simple POST avec payload markdown.
          curl -fsS -X POST "$GLITCHTIP_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(cat <<EOF
          {
            "title": "XCH smoke prod scheduled FAIL",
            "level": "error",
            "tags": {"environment": "production", "source": "github-actions-cron"},
            "message": "$(tail -20 /tmp/smoke.log | sed 's/"/\\"/g')"
          }
          EOF
          )" || echo "(webhook fallthrough — GlitchTip post failed, smoke result preserved)"

      - name: Summary
        if: always()
        run: |
          echo "## Smoke prod scheduled (Track E.4 Pass 2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Target: https://xch.eoncom.io (placeholder pilote RSI — adapter pour cutover employeur)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cron: 4×/jour (00h/06h/12h/18h UTC)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Exit code: ${{ steps.smoke.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "D4.4 figé RSI Track E.4 v2.1 — détection régression silencieuse non-PR-driven." >> $GITHUB_STEP_SUMMARY
