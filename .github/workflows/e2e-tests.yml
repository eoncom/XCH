name: E2E Smoke Tests

# S7.5 PR5h/10 — workflow refondu pour cibler xch.eoncom.io directement.
# Single-origin (NPM reverse proxy unifie API+UI sur même hostname) =
# pas d'issue cookie cross-port. Reproduit le comportement prod réel.
#
# Architecture précédente (PR5b/c/d/e/f/g) : setup CI 2-process local
# (frontend localhost:3001 + backend localhost:3002). Cross-origin
# artificiel cassait checkSession() côté layout (cookie SameSite=Lax
# ne se propage pas en cross-port même via Next.js rewrites).
#
# Décision utilisateur 2026-05-02 (Option 1 du ping iter 9) : pointer
# CI vers xch-deploy = environnement TEST officiel (cf DEPLOY_WORKFLOW
# obs[19][20] : mutations OK, cleanup endpoints scoped en place).
#
# Cf XCH_E2E_AUTH_STORAGE_STATE_PATTERN + XCH_E2E_SMOKE_AUTHORITY_VALIDATION
# + XCH_ITERATION_THRESHOLD_PRINCIPLE (3 entités gravées MCP S7.5).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  e2e-tests:
    name: Playwright E2E Smoke (@full-user-journey)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      #
      # Diagnostic : valider connectivité CI → xch-deploy avant Playwright
      #
      - name: Smoke connectivity check
        run: |
          echo "Testing connectivity to xch.eoncom.io..."
          curl -sS -o /dev/null -w "HTTP %{http_code} (%{time_total}s) size=%{size_download}b\n" --max-time 10 https://xch.eoncom.io/login || (echo "❌ CI cannot reach xch.eoncom.io — likely firewall/WAF blocking GitHub Actions IPs" && exit 1)
          echo "Testing API endpoint..."
          curl -sS -X POST https://xch.eoncom.io/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke-connectivity-check@invalid.test","password":"Test1234"}' \
            --max-time 10 \
            -w "\nHTTP %{http_code} (%{time_total}s)\n" || (echo "❌ API endpoint timed out" && exit 1)

      #
      # Run E2E Tests against xch.eoncom.io (single-origin)
      #
      # Pas de setup local (frontend/backend/postgres) — tout est sur
      # xch-deploy. Mutations smoke = quasi-nulles (login API + nav
      # read-only + 1 GET /api/auth/session) donc pas de cleanup
      # nécessaire. Pour les futures specs E2E qui mutent (sites/assets/
      # expenses), prévoir cleanup via /api/seed/reset/:domain en
      # afterAll (cf S7 PR0 endpoints scoped).
      #
      - name: Run Playwright Smoke Tests (@full-user-journey)
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: https://xch.eoncom.io
          PLAYWRIGHT_API_URL: https://xch.eoncom.io
          CI: true
        run: npx playwright test --grep "@smoke" --project=chromium --reporter=html,junit

      #
      # Upload Artifacts
      #
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: frontend/playwright-report/screenshots/
          retention-days: 7
