name: E2E Smoke Tests

# S7.5 PR5h/12 — workflow refondu pour single-origin via nginx en CI.
#
# Architecture précédente (iters 1-11) :
# - 2-process local localhost:3001/3002 = cross-origin artificiel cassait
#   layout checkSession() (SameSite=Lax bloque cross-port fetch)
# - xch.eoncom.io direct = firewall/WAF block IPs GitHub Actions runners
#
# Architecture S7.5 PR5h/12 (option 3 user choice 2026-05-02) :
# docker-compose.ci.yml lance nginx (port 8080) + frontend + backend +
# postgres + redis + minio dans un réseau Docker. Single-origin via
# nginx reverse proxy reproduit le NPM de prod.
#
# Cf XCH_E2E_AUTH_STORAGE_STATE_PATTERN + XCH_E2E_SMOKE_AUTHORITY_VALIDATION
# + XCH_ITERATION_THRESHOLD_PRINCIPLE (3 entités gravées MCP S7.5).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Playwright E2E Smoke (@full-user-journey)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install Frontend Dependencies (host — pour Playwright)
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      #
      # Build + start docker-compose CI single-origin
      #
      - name: Build and start CI stack
        run: |
          echo "Building docker-compose.ci.yml stack (nginx + frontend + backend + postgres + redis + minio)..."
          docker compose -f docker-compose.ci.yml up -d --build
          echo "Stack started. Containers:"
          docker compose -f docker-compose.ci.yml ps

      - name: Wait for nginx ready
        run: |
          echo "Waiting for nginx on port 8080..."
          npx wait-on http://localhost:8080/health -t 90000 || (echo "nginx not ready" && docker compose -f docker-compose.ci.yml logs && exit 1)
          echo "✅ nginx ready"

      - name: Wait for backend ready (via nginx proxy)
        run: |
          echo "Waiting for backend via nginx /api proxy..."
          # Le backend init prend du temps (prisma migrate deploy + dist/main start)
          for i in $(seq 1 30); do
            if curl -sS -o /dev/null -w "%{http_code}" http://localhost:8080/api/setup/status | grep -q "200\|404"; then
              echo "✅ Backend ready (iter $i)"
              break
            fi
            echo "Backend not ready yet (iter $i/30)..."
            sleep 5
          done
          curl -sS http://localhost:8080/api/setup/status | head -c 300 || true
          echo ""

      - name: Initialize App + Load Demo Data
        run: |
          echo "POST /api/setup/initialize via nginx (single-origin)..."
          curl -X POST http://localhost:8080/api/setup/initialize \
            -H "Content-Type: application/json" \
            -d '{
              "organizationName": "XCH CI Test",
              "subdomain": "xch-ci",
              "adminName": "Admin Démo",
              "adminEmail": "admin@demo.fr",
              "adminPassword": "Demo1234",
              "loadDemoData": true
            }' \
            --fail-with-body \
            --max-time 120 \
            -w "\nHTTP %{http_code} (%{time_total}s)\n" || (echo "❌ Setup initialize failed" && docker compose -f docker-compose.ci.yml logs backend && exit 1)
          echo "✅ Setup OK"

      - name: Smoke connectivity check (sanity)
        run: |
          echo "Login API check..."
          curl -sS -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@demo.fr","password":"Demo1234"}' \
            --max-time 10 \
            -w "\nHTTP %{http_code} (%{time_total}s)\n" -o /tmp/login.json || (echo "❌ Login API failed" && exit 1)
          head -c 200 /tmp/login.json
          echo ""

      - name: Run Playwright Smoke Tests (@full-user-journey)
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          PLAYWRIGHT_API_URL: http://localhost:8080
          CI: true
        run: npx playwright test --grep "@smoke" --project=chromium --reporter=html,junit

      #
      # Diagnostic — logs containers en cas de fail
      #
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== nginx logs ==="
          docker compose -f docker-compose.ci.yml logs nginx | tail -50 || true
          echo "=== backend logs ==="
          docker compose -f docker-compose.ci.yml logs backend | tail -100 || true
          echo "=== frontend logs ==="
          docker compose -f docker-compose.ci.yml logs frontend | tail -50 || true

      #
      # Upload Artifacts
      #
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: frontend/playwright-report/screenshots/
          retention-days: 7

      - name: Stop CI stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
