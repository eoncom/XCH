name: E2E Smoke Tests

# S7 PR5b — workflow refondu : exécute UNIQUEMENT la spec smoke
# `@full-user-journey` (10 tests sériels) au lieu du full E2E.
# Rationale : ~50 tests skip TODO + sélecteurs UI à confirmer = scope
# trop large pour PR5 release ; le smoke valide la régression
# bloquante annoncée dans le CHANGELOG v1.9.0 sans bloquer sur des
# specs encore à finaliser.
#
# Le full E2E (~210 tests) reste à activer en mini-session post-S7
# une fois les ~50 skip TODO levés (cf entité MCP
# XCH_E2E_SKIP_TODO_TRACKING — prioriser catégorie 6 polling env
# override, puis catégorie 1 sélecteurs UI).
#
# Ce workflow était `disabled_manually` avant PR5b (bug latent
# critique : la régression bloquante annoncée n'était jamais exécutée
# côté CI). Réactivé via `gh workflow enable` après merge PR5b.
#
# Cf XCH_E2E_SMOKE_AUTHORITY_VALIDATION pour le pattern : un filet
# de sécurité CI doit être ACTIVÉ + EXÉCUTÉ + RÉFÉRENCER endpoints
# RÉELS pour mériter son nom.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  e2e-tests:
    name: Playwright E2E Smoke (@full-user-journey)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # S7 PR0 — DB e2e isolée xch_e2e (au lieu de xch_dev partagée)
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: xch_e2e
          POSTGRES_USER: xch_e2e_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_E2E_PASSWORD || 'xch_e2e_password' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # S7 PR5c — image bitnami/minio (CMD par défaut `minio server /data`)
      # au lieu de minio/minio (qui nécessite `server /data` en CMD,
      # pas spécifiable dans GitHub Actions `services:` field). Cause
      # racine du fail "Failed to initialize container minio/minio:latest"
      # observé sur run 25251557631 (S7 PR5b validation). Bug latent
      # depuis l'origine du workflow — le commentaire "MinIO needs command
      # to start server / Will be handled in steps" reconnaissait le
      # problème mais aucune handling step ne couvrait ce cas.
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "mc ready local || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      #
      # Backend Setup
      #
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run Database Migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://xch_e2e_user:xch_e2e_password@localhost:5432/xch_e2e
        run: npx prisma migrate deploy

      - name: Seed Database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://xch_e2e_user:xch_e2e_password@localhost:5432/xch_e2e
        run: npm run prisma:seed || echo "Seed may have failed, continuing..."

      - name: Start Backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://xch_e2e_user:xch_e2e_password@localhost:5432/xch_e2e
          REDIS_URL: redis://localhost:6379
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_USE_SSL: false
          JWT_SECRET: e2e-test-jwt-secret-key
          NODE_ENV: test
        run: |
          npm run build
          npm run start:prod &
          echo $! > backend.pid

      #
      # Frontend Setup
      #
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build Frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3002
          NEXT_PUBLIC_APP_URL: http://localhost:3001
        run: npm run build

      - name: Start Frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3002
          NEXT_PUBLIC_APP_URL: http://localhost:3001
        run: |
          npm run start &
          echo $! > frontend.pid

      #
      # Wait for Services
      #
      - name: Wait for Backend Health Check
        run: |
          echo "Waiting for backend to be ready..."
          npx wait-on http://localhost:3002/health -t 60000 || (echo "Backend failed to start" && cat backend/logs/*.log && exit 1)

      - name: Wait for Frontend
        run: |
          echo "Waiting for frontend to be ready..."
          npx wait-on http://localhost:3001 -t 60000 || (echo "Frontend failed to start" && exit 1)

      #
      # Run E2E Tests
      #
      - name: Run Playwright Smoke Tests (@full-user-journey)
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3001
          PLAYWRIGHT_API_URL: http://localhost:3002
          CI: true
        # S7 PR5b — limiter au scope smoke (10 tests sériels). Le full
        # E2E (~210 tests, ~50 skip TODO) sera activé en mini-session
        # post-S7 quand la catégorie 1 sélecteurs UI sera levée.
        run: npx playwright test --grep "@smoke" --project=chromium --reporter=html,junit

      #
      # Upload Artifacts
      #
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: frontend/playwright-report/screenshots/
          retention-days: 7

      #
      # Cleanup
      #
      - name: Stop Services
        if: always()
        run: |
          [ -f backend/backend.pid ] && kill $(cat backend/backend.pid) || true
          [ -f frontend/frontend.pid ] && kill $(cat frontend/frontend.pid) || true
