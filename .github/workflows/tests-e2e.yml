name: Tests E2E

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  e2e-tests:
    name: Tests E2E Playwright
    runs-on: ubuntu-latest

    # Variables d'environnement pour les services
    env:
      # URLs XCH (localhost car GitHub runner)
      PLAYWRIGHT_BASE_URL: http://localhost:3001
      PLAYWRIGHT_API_URL: http://localhost:3002
      # Configuration base de données
      POSTGRES_DB: xch_dev
      POSTGRES_USER: xch_user
      POSTGRES_PASSWORD: xch_password_secure_2024
      DATABASE_URL: postgresql://xch_user:xch_password_secure_2024@localhost:5432/xch_dev
      # Configuration Redis
      REDIS_URL: redis://localhost:6379
      # Configuration MinIO
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      # Configuration JWT
      JWT_SECRET: test_jwt_secret_for_ci_only_not_production
      JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
      # Mode CI
      CI: true
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create required directories
        run: |
          mkdir -p frontend/playwright-report-host
          mkdir -p frontend/test-results-host
          mkdir -p backend/uploads

      - name: Start XCH infrastructure (PostgreSQL, Redis, MinIO)
        run: |
          cd backend
          docker compose up -d postgres redis minio minio-init
          echo "Waiting for services to be ready..."
          sleep 10

      - name: Check infrastructure health
        run: |
          cd backend
          docker compose ps
          docker compose logs postgres | tail -20
          docker compose logs redis | tail -10
          docker compose logs minio | tail -10

      - name: Run database migrations
        run: |
          cd backend
          # Build backend container with migrations
          docker compose up -d backend
          echo "Waiting for backend to be ready..."
          sleep 15
          docker compose logs backend | tail -30

      - name: Start frontend
        run: |
          cd backend
          docker compose up -d frontend
          echo "Waiting for frontend to be ready..."
          sleep 20
          docker compose logs frontend | tail -20

      - name: Verify XCH services are running
        run: |
          cd backend
          docker compose ps
          echo "Testing frontend health..."
          curl -f http://localhost:3001/login || echo "Frontend not ready yet"
          echo "Testing backend health..."
          curl -f http://localhost:3002/api/health || curl -f http://localhost:3002/ || echo "Backend not ready yet"

      - name: Create E2E test users
        run: |
          cd backend
          # Attendre que Prisma soit prêt
          sleep 5
          # Créer les utilisateurs de test via SQL direct
          docker compose exec -T postgres psql -U xch_user -d xch_dev <<'EOF'
          -- Supprimer utilisateurs existants si présents
          DELETE FROM users WHERE email IN ('admin@xch.local', 'manager@xch.local', 'tech@xch.local', 'viewer@xch.local');

          -- Admin (mot de passe: Admin123!)
          INSERT INTO users (id, email, "passwordHash", name, role, "tenantId", "createdAt", "updatedAt")
          VALUES (
            'user_e2e_admin',
            'admin@xch.local',
            '$2b$10$puL39CRrgPwUETJrnLlMPeUGzhfzsFgGf1j6IDF1E75gQWENMngWi',
            'Admin Test E2E',
            'ADMIN',
            'tenant_default',
            NOW(),
            NOW()
          ) ON CONFLICT ("tenantId", email) DO NOTHING;

          -- Manager (mot de passe: Manager123!)
          INSERT INTO users (id, email, "passwordHash", name, role, "tenantId", "createdAt", "updatedAt")
          VALUES (
            'user_e2e_manager',
            'manager@xch.local',
            '$2b$10$8HZ7Xqm5YfP3vN2dJ9KqLO5zF4wE6rH8pQ7sT1uV9xW3yA2bC5dE6',
            'Manager Test E2E',
            'MANAGER',
            'tenant_default',
            NOW(),
            NOW()
          ) ON CONFLICT ("tenantId", email) DO NOTHING;

          -- Technicien (mot de passe: Tech123!)
          INSERT INTO users (id, email, "passwordHash", name, role, "tenantId", "createdAt", "updatedAt")
          VALUES (
            'user_e2e_tech',
            'tech@xch.local',
            '$2b$10$7GY6Wpk4XeO2uM1cI8JpKN4yE3vD5qG7oP6rS0tU8wV2xZ1aB4cD5',
            'Tech Test E2E',
            'TECHNICIEN',
            'tenant_default',
            NOW(),
            NOW()
          ) ON CONFLICT ("tenantId", email) DO NOTHING;

          -- Viewer (mot de passe: Viewer123!)
          INSERT INTO users (id, email, "passwordHash", name, role, "tenantId", "createdAt", "updatedAt")
          VALUES (
            'user_e2e_viewer',
            'viewer@xch.local',
            '$2b$10$6FX5Voj3WdN1tL0bH7IoJM3xD2uC4pF6nO5qR9sT7vU1yY0zA3bC4',
            'Viewer Test E2E',
            'VIEWER',
            'tenant_default',
            NOW(),
            NOW()
          ) ON CONFLICT ("tenantId", email) DO NOTHING;
          EOF

      - name: Build E2E tests Docker image
        run: |
          docker compose -f docker-compose.e2e.yml build playwright-tests

      - name: Run E2E tests (Chromium only for CI)
        id: e2e_tests
        continue-on-error: true
        run: |
          # Modifier temporairement le docker-compose pour CI
          # Utiliser localhost au lieu de 192.168.0.13
          docker compose -f docker-compose.e2e.yml run --rm \
            -e PLAYWRIGHT_BASE_URL=http://localhost:3001 \
            -e PLAYWRIGHT_API_URL=http://localhost:3002 \
            playwright-tests \
            npx playwright test \
              --project=chromium \
              --reporter=html,junit \
              --output=test-results \
              --retries=1 \
              --workers=2

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report-host/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results-host/
          retention-days: 30

      - name: Upload JUnit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: frontend/test-results-host/*.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Display test summary
        if: always()
        run: |
          echo "## E2E Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "frontend/test-results-host/results.xml" ]; then
            echo "JUnit report generated ✓" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No JUnit report found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Download artifacts to view detailed Playwright HTML report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Known Issues (MVP)" >> $GITHUB_STEP_SUMMARY
          echo "- Tests avancés auth (persistance session/logout) = Known Issue architectural (SSR vs CSR cookies)" >> $GITHUB_STEP_SUMMARY
          echo "- Voir E2E_VALIDATION_REPORT.md pour détails complets" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          cd backend
          docker compose down -v || true
          docker compose -f ../docker-compose.e2e.yml down || true

      - name: Fail if tests failed
        if: steps.e2e_tests.outcome == 'failure'
        run: |
          echo "❌ E2E tests failed. Check artifacts for detailed reports."
          exit 1
