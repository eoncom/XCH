name: Load Test (k6)

# Track E.4 PR2 Pass 3.3 — k6 load test gated workflow.
#
# `workflow_dispatch` only : coût + bruit jugés trop élevés pour chaque PR.
# Baseline rapport committed dans docs/perf/load-test-2026-05-16.md.
# Re-run manuel par stakeholder pour valider hotfixes ou régressions.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario(s) to run: all | smoke | read | write | audit'
        required: false
        default: 'all'

jobs:
  load:
    name: k6 load test (seed + 4 scenarios)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_DB: xch_loadtest
          POSTGRES_USER: xch_user
          POSTGRES_PASSWORD: xch_password_secure_2024
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xch_user -d xch_loadtest"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://xch_user:xch_password_secure_2024@localhost:5432/xch_loadtest
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: test_jwt_secret_for_ci_only_not_production_at_least_32_chars
      JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only_at_least_32_chars
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      XCH_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      NODE_ENV: test
      CI: 'true'
      MINIO_ENDPOINT: localhost
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: dummy
      MINIO_SECRET_KEY: dummysecretkeydummysecretkeydummy
      MINIO_BUCKET_NAME: xch-test
      K6_BASE_URL: http://localhost:3000
      K6_ADMIN_EMAIL: admin-lt@loadtest.local
      K6_ADMIN_PASSWORD: Loadtest1234
      # Throttler disabled for k6 (50 VUs > 5/min would 429 the whole run)
      THROTTLE_AUTH_LIMIT: '99999'
      THROTTLE_AUTH_TTL: '60'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Seed loadtest fixture
        working-directory: backend
        run: |
          npx ts-node scripts/seed-loadtest.ts --reset 2>&1 | tee /tmp/seed.log
          echo "=== seed durations ==="
          grep -E '\[(tenant|delegations|sites|users|assets|audit)\] Done' /tmp/seed.log || true

      - name: Boot backend (daemon)
        working-directory: backend
        run: |
          nohup node dist/main.js > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          # Wait readiness up to 60s
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "backend up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:3000/api/health || (cat /tmp/backend.log; exit 1)

      - name: Run smoke-load
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'smoke' }}
        run: k6 run --summary-export=/tmp/k6-smoke.json tests/load/scenarios/smoke-load.js

      - name: Run read-heavy
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'read' }}
        run: k6 run --summary-export=/tmp/k6-read.json tests/load/scenarios/read-heavy.js

      - name: Run write-mixed
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'write' }}
        run: k6 run --summary-export=/tmp/k6-write.json tests/load/scenarios/write-mixed.js

      - name: Run audit-heavy
        if: ${{ github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'audit' }}
        run: k6 run --summary-export=/tmp/k6-audit.json tests/load/scenarios/audit-heavy.js

      - name: Collect backend log
        if: always()
        run: tail -n 200 /tmp/backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi

      - name: Upload k6 summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summaries
          path: /tmp/k6-*.json
          retention-days: 14

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log
          retention-days: 7
